name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: |
          npm run build > build.log 2>&1 || touch build_failed.txt

      - name: Debug Workspace files
        run: |
          echo "=== Root Files ==="
          ls -la
          echo "=== Check dist folder ==="
          ls -la dist || echo "dist folder not found"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Capacitor Doctor
        run: |
          npx cap doctor > doctor.log 2>&1 || touch doctor_failed.txt

      - name: Sync Capacitor
        run: |
          npx cap sync android --verbose > sync.log 2>&1 || touch sync_failed.txt

      - name: Push Logs to GitHub
        if: always()
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "actions@github.com"
          git checkout -b debug-logs || git checkout debug-logs
          echo "=== BUILD LOG ===" > report.txt
          cat build.log >> report.txt || echo "No build.log" >> report.txt
          echo "=== DOCTOR LOG ===" >> report.txt
          cat doctor.log >> report.txt || echo "No doctor.log" >> report.txt
          echo "=== SYNC LOG ===" >> report.txt
          cat sync.log >> report.txt || echo "No sync.log" >> report.txt
          git add report.txt
          git add -f build.log doctor.log sync.log || true
          git add build_failed.txt doctor_failed.txt sync_failed.txt || true
          git commit -m "ci: save build logs"
          git push -f origin debug-logs

      - name: Verify Build Steps Success
        run: |
          if [ -f build_failed.txt ]; then
            echo "Build Web App failed! See build.log on the debug-logs branch."
            exit 1
          fi
          if [ -f doctor_failed.txt ]; then
            echo "Capacitor Doctor failed! See doctor.log on the debug-logs branch."
          fi
          if [ -f sync_failed.txt ]; then
            echo "Capacitor Sync failed! See sync.log on the debug-logs branch."
            exit 1
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
